<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 3: Florida Manufacturing Concentrations Hit Hard by Slowing Trade Activity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      padding: 20px 24px 16px;
    }
    .figure-label {
      text-align: center;
      color: #d02030;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }
    .figure-title {
      text-align: center;
      color: #d02030;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: left;
      font-size: 11px;
      color: #444444;
      font-style: italic;
      margin-bottom: 14px;
    }
    .chart-container {
      position: relative;
      height: 700px;
      width: 100%;
    }
    .source {
      text-align: center;
      font-size: 10px;
      color: #888888;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <p class="figure-label">Figure 3.</p>
  <p class="figure-title">Florida Manufacturing Concentrations Hit Hard by Slowing Trade Activity</p>
  <p class="subtitle">12-month change in payrolls in December 2025, thousands of persons</p>
  <div class="chart-container">
    <canvas id="fig3Chart"></canvas>
  </div>
  <p class="source">Source: Cato Institute</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    const labels = [
      'Fabricated metal products',
      'Beverage, tobacco, and leather\nand allied products',
      'Chemicals',
      'Primary metals',
      'Electrical equipment, appliances,\nand components',
      'Nonmetallic mineral products',
      'Paper',
      'Textile products',
      'Petroleum and coal products',
      'Food',
      'Textiles',
      'Furniture and related products',
      'Apparel',
      'Miscellaneous durables',
      'Printing and related support activities',
      'Plastics and rubber products',
      'Wood products',
      'Machinery',
      'Computers and electronic products',
      'Transportation equipment',
      'Total manufacturing'
    ];

    const values = [
      8.8, 5.8, 5.4, 2.7, 2.2, 2.1, 1.1,
      -0.5, -0.7, -0.8, -1.6, -3.1, -4,
      -6, -7.6, -7.8, -9.9, -10.6, -17.9, -26.1,
      -68
    ];

    const backgroundColors = values.map((v, i) => {
      if (i === values.length - 1) return '#0D1730';
      return v >= 0 ? '#D02030' : '#1A2E5E';
    });

    const hoverColors = values.map((v, i) => {
      if (i === values.length - 1) return '#0a1020';
      return v >= 0 ? '#a8001f' : '#0f1c3a';
    });

    let chartCreated = false;

    function buildChart() {
      if (chartCreated) return;
      chartCreated = true;

      const canvas = document.getElementById('fig3Chart');
      const chartCtx = canvas.getContext('2d');

      new Chart(chartCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '12-month payroll change (thousands)',
            data: values,
            backgroundColor: backgroundColors,
            hoverBackgroundColor: hoverColors,
            borderWidth: 0,
            borderRadius: 2,
            borderSkipped: false
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 1600,
            easing: 'easeOutQuart',
            x: { from: 0 }
          },
          interaction: { mode: 'index', intersect: true },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(255,255,255,0.97)',
              borderColor: '#ddd',
              borderWidth: 1,
              titleColor: '#111',
              bodyColor: '#333',
              titleFont: { family: 'Arial', size: 12, weight: 'bold' },
              bodyFont: { family: 'Arial', size: 12 },
              padding: 10,
              callbacks: {
                title: items => items[0].label.replace('\n', ' '),
                label: item => {
                  const v = item.parsed.x;
                  return '  Change: ' + (v >= 0 ? '+' : '') + v.toLocaleString() + 'k jobs';
                }
              }
            }
          },
          scales: {
            x: {
              position: 'top',
              grid: {
                color: ctx => ctx.tick.value === 0 ? '#999999' : '#eeebe6',
                lineWidth: ctx => ctx.tick.value === 0 ? 1.5 : 0.5
              },
              ticks: {
                color: '#555555',
                font: { family: 'Arial', size: 11 },
                callback: val => (val >= 0 ? '+' : '') + val
              }
            },
            y: {
              grid: { display: false },
              ticks: {
                color: ctx => ctx.index === labels.length - 1 ? '#111111' : '#333333',
                font: ctx => ({
                  family: 'Arial',
                  size: 11,
                  weight: ctx.index === labels.length - 1 ? 'bold' : 'normal'
                }),
                maxRotation: 0,
                autoSkip: false
              }
            }
          }
        }
      });
    }

    function announceReady() {
      if (window.parent === window) return;
      try { window.parent.postMessage('ftw-chart-ready', '*'); } catch (e) {}
    }

    window.addEventListener('message', function(e) {
      if (e.data === 'ftw-chart-animate') buildChart();
      else if (e.data === 'ftw-chart-ping') announceReady();
    });

    // Tell the parent we're ready in case it's already listening.
    announceReady();

    // Last-resort fallback in case the handshake fails entirely.
    setTimeout(buildChart, 60000);
  </script>
</body>
</html>
